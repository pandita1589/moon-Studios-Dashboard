name: Release Moon Studios

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write  # necesario para commitear latest.json a main

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build y Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN:                       ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName:          ${{ github.ref_name }}
          releaseName:      "Moon Studios ${{ github.ref_name }}"
          releaseBody:      "Nueva versión de Moon Studios Portal Corporativo."
          releaseDraft:     false
          prerelease:       false
          includeUpdaterJson: true   # genera latest.json y lo sube al release

      # ── Copiar latest.json del release a la raíz del repo ─────────────────
      # Tauri lee desde raw.githubusercontent.com/…/main/latest.json
      # El archivo que genera tauri-action queda en el release como asset,
      # pero NO en el repo. Este paso lo descarga y lo commitea a main.
      - name: Copiar latest.json a main
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Esperar a que el release esté publicado
          sleep 10

          # Descargar el latest.json que tauri-action subió al release
          curl -sL \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/octet-stream" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}" \
            | python3 -c "
          import sys, json, urllib.request, os

          release = json.load(sys.stdin)
          assets  = release.get('assets', [])

          # tauri-action nombra el archivo 'latest.json'
          asset = next((a for a in assets if a['name'] == 'latest.json'), None)

          if not asset:
              print('ERROR: latest.json no encontrado en el release')
              sys.exit(1)

          req = urllib.request.Request(
              asset['browser_download_url'],
              headers={'Authorization': f'Bearer {os.environ[\"GITHUB_TOKEN\"]}'}
          )
          with urllib.request.urlopen(req) as r:
              content = r.read()

          with open('latest.json', 'wb') as f:
              f.write(content)

          print('latest.json descargado correctamente:')
          print(content.decode())
          "

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git checkout main

          git add latest.json
          git diff --cached --quiet \
            && echo "latest.json sin cambios, nada que commitear" \
            && exit 0

          git commit -m "chore: update latest.json → ${{ github.ref_name }} [skip ci]"
          git push origin main